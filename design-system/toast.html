<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toast</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--border:#E3E8EE;--success:#1A7F64;--success-tint:#E6F4EF;--danger:#C0123C;--danger-tint:#FCE8EC;--accent:#5469D4;--accent-tint:#EDEFFB;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 16px}
.stack{display:flex;flex-direction:column;gap:12px;max-width:380px}
.toast{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:13px 15px;box-shadow:0 6px 20px rgba(26,31,54,.10)}
.ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg{flex:1;font-size:14px;font-weight:500}
.x{color:var(--ink-subtle);font-size:16px;cursor:pointer}
.s{border-left-color:var(--success)} .s .ic{background:var(--success-tint);color:var(--success)}
.e{border-left-color:var(--danger)} .e .ic{background:var(--danger-tint);color:var(--danger)}
.i{border-left-color:var(--accent)} .i .ic{background:var(--accent-tint);color:var(--accent)}
</style></head><body>
<h2>Toast — 성공 / 오류 / 안내</h2>
<div class="stack">
  <div class="toast s"><div class="ic">✓</div><div class="msg">견적서가 제출되었습니다.</div><div class="x">×</div></div>
  <div class="toast e"><div class="ic">!</div><div class="msg">파일 크기가 제한을 초과했습니다.</div><div class="x">×</div></div>
  <div class="toast i"><div class="ic">↻</div><div class="msg">임시저장되었습니다.</div><div class="x">×</div></div>
</div>
</body></html>
