<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notification dropdown</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F7F9FC;--border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--danger:#C0123C;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 16px}
.panel{width:340px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(26,31,54,.14);overflow:hidden}
.hd{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.hd .t{font-size:14px;font-weight:700}
.hd a{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600}
.it{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border)}
.it.unread{background:#FBFBFE}
.ic{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--accent-tint)}
.tx{font-size:13px;line-height:1.45}
.tx .b{font-weight:600}
.tm{font-size:11px;color:var(--ink-subtle);margin-top:3px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:auto;margin-top:6px;flex-shrink:0}
.foot{padding:11px;text-align:center}
.foot a{font-size:13px;color:var(--ink-muted);text-decoration:none;font-weight:600}
</style></head><body>
<h2>알림 드롭다운</h2>
<div class="panel">
  <div class="hd"><span class="t">알림</span><a>모두 읽음</a></div>
  <div class="it unread"><div class="ic">📩</div><div class="tx"><span><span class="b">천일쇼파</span>가 견적서를 보냈습니다.</span><div class="tm">3분 전</div></div><div class="dot"></div></div>
  <div class="it unread"><div class="ic" style="background:#E6F4EF">✓</div><div class="tx"><span>매칭이 <span class="b">수락</span>되었습니다.</span><div class="tm">1시간 전</div></div><div class="dot"></div></div>
  <div class="it"><div class="ic" style="background:#FBF3E0">💬</div><div class="tx"><span>새 채팅 메시지가 도착했습니다.</span><div class="tm">어제</div></div></div>
  <div class="foot"><a>알림 전체 보기</a></div>
</div>
</body></html>
