<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auth · Social login</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--border:#E3E8EE;--accent:#5469D4;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;min-height:480px;display:flex;align-items:center;justify-content:center;padding:30px}
.card{width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 16px rgba(26,31,54,.06);padding:36px 30px;text-align:center}
.logo{font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-.02em}
.tag{font-size:14px;color:var(--ink-muted);margin:8px 0 28px}
.btn{width:100%;height:50px;border-radius:10px;border:none;font-family:inherit;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:11px}
.kakao{background:#FEE500;color:#191600}
.naver{background:#03C75A;color:#fff}
.terms{font-size:12px;color:var(--ink-subtle);line-height:1.5;margin-top:18px}
.terms a{color:var(--ink-muted)}
</style></head><body>
<div class="card">
  <div class="logo">소핏</div>
  <div class="tag">맞춤 쇼파 견적, 3분이면 충분해요</div>
  <button class="btn kakao">💬 카카오로 시작하기</button>
  <button class="btn naver">N 네이버로 시작하기</button>
  <p class="terms">계속하면 <a>이용약관</a> 및 <a>개인정보처리방침</a>에<br>동의하는 것으로 간주됩니다.</p>
</div>
</body></html>
