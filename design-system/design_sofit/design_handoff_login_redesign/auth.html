<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auth · Login / Signup</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root{
  --brand:#0064FF;--brand-hover:#004FCC;--brand-active:#003D99;
  --brand-tint:#E8F1FF;--brand-tint-strong:#C9DEFF;
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;
  --border:#E3E8EE;--border-strong:#D5DBE3;
  --success:#1A7F64;--danger:#E5484D;
  --radius-card:10px;--radius-control:6px;--radius-pill:9999px;
  --shadow-card:0 1px 1px rgba(0,0,0,.03),0 2px 5px rgba(26,31,54,.06);
  --shadow-card-hover:0 4px 14px rgba(26,31,54,.10);
  --shadow-pop:0 8px 28px rgba(26,31,54,.14);
  --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font);color:var(--ink);background:var(--surface);margin:0;-webkit-font-smoothing:antialiased}

.split{height:100vh;display:grid;grid-template-columns:minmax(320px,40%) 1fr}

/* ── left: brand panel ── */
.brand{
  position:relative;overflow:hidden;background:var(--brand);
  display:flex;flex-direction:column;justify-content:space-between;
  padding:36px 44px 28px;color:#fff;
}
.brand::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(560px 420px at 12% 100%, rgba(255,255,255,.14), transparent 60%),
    radial-gradient(480px 480px at 100% 0%, rgba(255,255,255,.10), transparent 55%);
  pointer-events:none;
}
.brand::after{
  content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.16) 1px, transparent 1px);
  background-size:22px 22px;
  -webkit-mask-image:linear-gradient(180deg, transparent, rgba(0,0,0,.7) 55%, transparent 100%);
  mask-image:linear-gradient(180deg, transparent, rgba(0,0,0,.7) 55%, transparent 100%);
}
.brand-logo{position:relative;font-size:22px;font-weight:800;letter-spacing:-.02em}
.brand-body{position:relative;margin-top:auto;margin-bottom:auto}
.brand-headline{font-size:28px;font-weight:800;letter-spacing:-.03em;line-height:1.3;margin:0}
.brand-sub{margin:12px 0 0;font-size:14.5px;line-height:1.6;color:rgba(255,255,255,.78);font-weight:500;max-width:340px}
.brand-points{list-style:none;margin:22px 0 0;padding:0;display:flex;flex-direction:column;gap:10px}
.brand-points li{display:flex;align-items:center;gap:10px;font-size:14.5px;font-weight:600;color:rgba(255,255,255,.92)}
.brand-points svg{flex:none;width:18px;height:18px}
.brand-foot{position:relative;font-size:12.5px;color:rgba(255,255,255,.56);font-weight:500}

/* ── right: form panel ── */
.formside{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 32px;position:relative;height:100%;overflow-y:auto}
.back{position:absolute;top:18px;left:32px;display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--ink-muted);text-decoration:none;transition:color .12s}
.back:hover{color:var(--ink)}
.back svg{width:15px;height:15px}

.formwrap{width:100%;max-width:376px}
.mobile-logo{display:none;text-align:center;margin-bottom:18px}
.mobile-logo .lg{font-size:21px;font-weight:800;color:var(--brand);letter-spacing:-.02em}
.mobile-logo .tg{margin-top:6px;font-size:13.5px;color:var(--ink-muted);font-weight:500}

.head{margin-bottom:16px}
.head h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.03em;color:var(--ink)}
.head p{margin:5px 0 0;font-size:13.5px;color:var(--ink-muted);font-weight:500}

.social{display:flex;flex-direction:column;gap:8px}
.sbtn{
  width:100%;height:44px;border-radius:var(--radius-card);border:1px solid transparent;
  font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:filter .12s,box-shadow .12s,transform .12s;
}
.sbtn:active{transform:translateY(1px)}
.sbtn svg{flex:none;width:18px;height:18px}
.kakao{background:#FEE500;color:#191919}
.kakao:hover{filter:brightness(.96)}
.naver{background:#03C75A;color:#fff}
.naver:hover{filter:brightness(.94)}

.divider{position:relative;margin:14px 0;text-align:center}
.divider::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.divider span{position:relative;background:var(--surface);padding:0 12px;font-size:12.5px;color:var(--ink-subtle);font-weight:600}

.tabs{display:flex;background:var(--surface-muted);border-radius:var(--radius-card);padding:4px;margin-bottom:12px;position:relative}
.tab{flex:1;position:relative;z-index:1;padding:7px 0;text-align:center;font-size:13.5px;font-weight:700;color:var(--ink-muted);background:none;border:none;font-family:inherit;cursor:pointer;border-radius:7px;transition:color .18s}
.tab.is-active{color:var(--ink)}
.tab-indicator{position:absolute;top:4px;left:4px;width:calc(50% - 4px);height:calc(100% - 8px);background:#fff;border-radius:7px;box-shadow:var(--shadow-card);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.tabs[data-mode="signup"] .tab-indicator{transform:translateX(100%)}

.field{width:100%;height:42px;padding:0 14px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);outline:none;transition:border-color .12s,box-shadow .12s}
.field::placeholder{color:var(--ink-subtle)}
.field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
.form-col{display:flex;flex-direction:column;gap:8px}

.agree{display:flex;align-items:flex-start;gap:8px;padding:1px 2px 0;cursor:pointer}
.agree input{margin-top:2px;width:16px;height:16px;flex:none;accent-color:var(--brand);border-radius:4px}
.agree span{font-size:12.5px;line-height:1.55;color:var(--ink-muted)}
.agree a{color:var(--ink);font-weight:700;text-decoration:underline;text-underline-offset:2px}
.agree .req{color:var(--danger);font-weight:700}

.submit{width:100%;height:44px;font-family:inherit;font-weight:700;font-size:14.5px;border:none;cursor:pointer;color:#fff;transition:background .12s,opacity .12s,transform .12s}
.submit:active{transform:translateY(1px)}
.submit-primary{background:var(--brand);border-radius:var(--radius-control)}
.submit-primary:hover{background:var(--brand-hover)}
.submit-dark{background:var(--ink);border-radius:var(--radius-card)}
.submit-dark:hover{opacity:.92}

.form-pane{display:none;flex-direction:column;gap:10px}
.form-pane.is-active{display:flex}

.legal{margin:14px 0 0;text-align:center;font-size:11.5px;color:var(--ink-subtle);line-height:1.55}
.legal a{color:var(--ink-muted);text-decoration:underline;text-underline-offset:2px}
.home-link{margin-top:12px;text-align:center}
.home-link a{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--ink-muted);text-decoration:none;transition:color .12s}
.home-link a:hover{color:var(--ink)}
.home-link svg{width:14px;height:14px}

@media(max-width:860px){
  .split{grid-template-columns:1fr}
  .brand{display:none}
  .mobile-logo{display:block}
  .formside{padding:24px}
}
</style></head>
<body>

<div class="split">

  <!-- ══ LEFT: brand panel ══ -->
  <div class="brand">
    <div class="brand-logo">소핏</div>
    <div class="brand-body">
      <h2 class="brand-headline">인테리어의 모든 공정,<br>검증된 공장과 함께</h2>
      <p class="brand-sub">현장 정보만 입력하면 검증된 공장들이 견적을 보냅니다. 여러 견적을 비교하고 가장 좋은 조건으로 진행하세요.</p>
      <ul class="brand-points">
        <li><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="rgba(255,255,255,.5)"/><path d="M6 10.2l2.6 2.6L14.2 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>실측부터 시공까지 한 번에</li>
        <li><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="rgba(255,255,255,.5)"/><path d="M6 10.2l2.6 2.6L14.2 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>검증된 공장만 매칭</li>
        <li><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="rgba(255,255,255,.5)"/><path d="M6 10.2l2.6 2.6L14.2 7" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>여러 견적 비교, 투명한 가격</li>
      </ul>
    </div>
    <div class="brand-foot">© 2026 SOFIT</div>
  </div>

  <!-- ══ RIGHT: form panel ══ -->
  <div class="formside">
    <a class="back" href="#">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 15.5L7 10l5.5-5.5"/></svg>
      홈으로
    </a>

    <div class="formwrap">
      <div class="mobile-logo">
        <div class="lg">소핏</div>
        <div class="tg">인테리어의 모든 공정, 검증된 공장 매칭</div>
      </div>

      <div class="head">
        <h1 id="headTitle">다시 만나서 반가워요</h1>
        <p id="headSub">계정으로 로그인하고 견적을 이어가세요</p>
      </div>

      <div class="social">
        <button type="button" class="sbtn kakao">
          <svg viewBox="0 0 18 18" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M9 1C4.582 1 1 3.895 1 7.455c0 2.28 1.52 4.282 3.808 5.413L3.9 16.1a.25.25 0 00.37.272L8.2 13.85c.264.024.531.037.8.037 4.418 0 8-2.895 8-6.432C17 3.895 13.418 1 9 1z" fill="#191919"/></svg>
          카카오로 시작하기
        </button>
        <button type="button" class="sbtn naver">
          <svg viewBox="0 0 18 18" fill="none"><path d="M10.18 9.27L7.54 5H5v8h2.82V8.73L10.46 13H13V5h-2.82v4.27z" fill="white"/></svg>
          네이버로 시작하기
        </button>
      </div>

      <div class="divider"><span>또는</span></div>

      <div class="tabs" id="tabs" data-mode="login">
        <div class="tab-indicator"></div>
        <button type="button" class="tab is-active" id="tabLogin">로그인</button>
        <button type="button" class="tab" id="tabSignup">회원가입</button>
      </div>

      <div class="form-pane is-active" id="paneLogin">
        <div class="form-col">
          <input class="field" type="email" placeholder="이메일" autocomplete="email">
          <input class="field" type="password" placeholder="비밀번호" autocomplete="current-password">
        </div>
        <button type="button" class="submit submit-primary">이메일로 로그인</button>
      </div>

      <div class="form-pane" id="paneSignup">
        <div class="form-col">
          <input class="field" type="text" placeholder="이름" autocomplete="name">
          <input class="field" type="email" placeholder="이메일" autocomplete="email">
          <input class="field" type="password" placeholder="비밀번호 (8자 이상)" autocomplete="new-password">
        </div>
        <label class="agree">
          <input type="checkbox">
          <span><a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다. <span class="req">(필수)</span></span>
        </label>
        <button type="button" class="submit submit-dark">이메일로 회원가입</button>
      </div>

      <p class="legal">로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.</p>

      <div class="home-link">
        <a href="#">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 15.5L7 10l5.5-5.5"/></svg>
          홈으로 돌아가기
        </a>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  var tabs = document.getElementById('tabs');
  var tabLogin = document.getElementById('tabLogin');
  var tabSignup = document.getElementById('tabSignup');
  var paneLogin = document.getElementById('paneLogin');
  var paneSignup = document.getElementById('paneSignup');
  var headTitle = document.getElementById('headTitle');
  var headSub = document.getElementById('headSub');

  function setMode(mode){
    tabs.setAttribute('data-mode', mode);
    tabLogin.classList.toggle('is-active', mode === 'login');
    tabSignup.classList.toggle('is-active', mode === 'signup');
    paneLogin.classList.toggle('is-active', mode === 'login');
    paneSignup.classList.toggle('is-active', mode === 'signup');
    if(mode === 'login'){
      headTitle.textContent = '다시 만나서 반가워요';
      headSub.textContent = '계정으로 로그인하고 견적을 이어가세요';
    } else {
      headTitle.textContent = '계정 만들기';
      headSub.textContent = '몇 초면 가입이 끝나요';
    }
  }
  tabLogin.addEventListener('click', function(){ setMode('login'); });
  tabSignup.addEventListener('click', function(){ setMode('signup'); });
})();
</script>
</body></html>
