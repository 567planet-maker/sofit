<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Empty state</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;--border:#E3E8EE;--border-strong:#D5DBE3;--accent:#5469D4;--accent-tint:#EDEFFB;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 16px}
.empty{max-width:480px;border:1.5px dashed var(--border-strong);border-radius:12px;background:var(--surface);padding:48px 24px;text-align:center}
.ic{width:56px;height:56px;border-radius:14px;background:var(--accent-tint);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.t{font-size:16px;font-weight:700}
.d{font-size:14px;color:var(--ink-muted);margin-top:6px}
.btn{margin-top:20px;height:40px;padding:0 18px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer}
</style></head><body>
<h2>빈 상태 (Empty state)</h2>
<div class="empty">
  <div class="ic">📋</div>
  <div class="t">아직 견적 요청이 없습니다</div>
  <div class="d">현장 정보를 입력하면 공장들이 견적을 보내드려요.</div>
  <button class="btn">첫 견적 요청하기</button>
</div>
</body></html>
