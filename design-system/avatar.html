<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avatar</title>
<style>
:root{
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--border:#E3E8EE;
  --accent:#5469D4;--accent-tint:#EDEFFB;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px;-webkit-font-smoothing:antialiased}
h1{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-subtle);font-weight:600;margin:0 0 24px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:24px 0 14px}
.row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.av{border-radius:50%;background-size:cover;background-position:center;flex-shrink:0;border:1px solid rgba(26,31,54,.06)}
.ph1{background-image:linear-gradient(135deg,#7C8AE0,#5469D4)}
.ph2{background-image:linear-gradient(135deg,#5FBE9B,#1A7F64)}
.s-sm{width:28px;height:28px}.s-md{width:38px;height:38px}.s-lg{width:52px;height:52px}.s-xl{width:72px;height:72px}
.ini{display:flex;align-items:center;justify-content:center;color:var(--accent);background:var(--accent-tint);font-weight:700;border-radius:50%}
.ini.s-md{font-size:14px}.ini.s-lg{font-size:18px}.ini.s-xl{font-size:24px}
.user{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.user .nm{font-size:14px;font-weight:600}
.user .rl{font-size:12px;color:var(--ink-subtle);margin-top:1px}
.stack{display:flex}
.stack .av{margin-left:-10px;box-shadow:0 0 0 2px var(--surface)}
.stack .av:first-child{margin-left:0}
.more{display:flex;align-items:center;justify-content:center;background:var(--surface);color:var(--ink-muted);font-size:12px;font-weight:700;margin-left:-10px;box-shadow:0 0 0 2px var(--surface)}
</style></head>
<body>
<h1>Avatar · 프로필 사진</h1>

<h2>사진 — sizes</h2>
<div class="row">
  <div class="av ph1 s-sm"></div><div class="av ph1 s-md"></div><div class="av ph1 s-lg"></div><div class="av ph1 s-xl"></div>
</div>

<h2>이니셜 fallback (사진 없을 때)</h2>
<div class="row">
  <div class="ini s-md">김</div><div class="ini s-lg">천</div><div class="ini s-xl">우</div>
</div>

<h2>사용자 행 (이름 · 역할)</h2>
<div class="row">
  <div class="user"><div class="av ph1 s-md"></div><div><div class="nm">김동건</div><div class="rl">고객</div></div></div>
  <div class="user"><div class="av ph2 s-md"></div><div><div class="nm">천일쇼파</div><div class="rl">공장 · 승인됨</div></div></div>
</div>

<h2>겹친 아바타 (참여자)</h2>
<div class="row">
  <div class="stack"><div class="av ph1 s-md"></div><div class="av ph2 s-md"></div><div class="ini s-md" style="margin-left:-10px;box-shadow:0 0 0 2px var(--surface)">한</div><div class="av more s-md">+3</div></div>
</div>
</body></html>
