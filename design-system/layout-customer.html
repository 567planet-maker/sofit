<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer / Factory Shell</title>
<style>
:root{
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;
  --border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--danger:#E5484D;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;-webkit-font-smoothing:antialiased}
.page{min-height:660px;display:flex;flex-direction:column}
.hd{position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-size:18px;font-weight:700;color:var(--accent)}
.nav{display:flex;align-items:center;gap:22px}
.nav a{font-size:14px;font-weight:600;color:var(--ink-muted);text-decoration:none}
.nav a.on{color:var(--ink)}
.right{display:flex;align-items:center;gap:12px}
.bell{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative}
.bell::after{content:"";position:absolute;top:7px;right:8px;width:6px;height:6px;background:var(--danger);border-radius:50%;border:2px solid #fff}
.av{width:30px;height:30px;border-radius:50%;background-image:linear-gradient(135deg,#7C8AE0,#5469D4)}
.main{flex:1;width:100%;max-width:760px;margin:0 auto;padding:30px 20px}
.h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0 0 18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 1px rgba(0,0,0,.03),0 2px 5px rgba(26,31,54,.06);padding:18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.card .t{font-size:15px;font-weight:600}.card .s{font-size:13px;color:var(--ink-muted);margin-top:3px}
.b{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--accent-tint);color:var(--accent)}
.ft{border-top:1px solid var(--border);background:var(--surface);padding:20px 24px;display:flex;justify-content:space-between;font-size:12px;color:var(--ink-subtle)}
.ft a{color:var(--ink-muted);text-decoration:none;margin-left:14px}
</style></head>
<body>
<div class="page">
  <header class="hd">
    <div class="logo">소핏</div>
    <nav class="nav"><a class="on">내 견적</a><a>채팅</a></nav>
    <div class="right"><div class="bell">🔔</div><div class="av"></div></div>
  </header>
  <main class="main">
    <h1 class="h1">내 견적 요청</h1>
    <div class="card"><div><div class="t">강남 플래그십 매장</div><div class="s">천일쇼파 · 2026.06.26</div></div><span class="b">매칭중</span></div>
    <div class="card"><div><div class="t">분당 카페 리뉴얼</div><div class="s">우리가구 · 2026.06.24</div></div><span class="b" style="background:#E6F4EF;color:#1A7F64">계약완료</span></div>
  </main>
  <footer class="ft"><div>© 2026 sofit</div><div><a>이용약관</a><a>개인정보처리방침</a></div></footer>
</div>
</body></html>
