<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dropdown menu</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;--border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--danger:#E5484D;--danger-tint:#FDECEC;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 16px}
.trigger{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:inline-flex;align-items:center;justify-content:center;color:var(--ink-muted);font-size:18px;font-weight:700}
.menu{width:200px;background:var(--surface);border:1px solid var(--border);border-radius:11px;box-shadow:0 8px 28px rgba(26,31,54,.14);padding:6px;margin-top:8px}
.mi{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:7px;font-size:14px;font-weight:500;color:var(--ink-muted);cursor:pointer}
.mi:hover{background:var(--surface-muted);color:var(--ink)}
.mi .ic{width:16px;text-align:center}
.sep{height:1px;background:var(--border);margin:6px 4px}
.mi.danger{color:var(--danger)}
.mi.danger:hover{background:var(--danger-tint)}
</style></head><body>
<h2>액션 드롭다운 메뉴</h2>
<div class="trigger">⋯</div>
<div class="menu">
  <div class="mi"><span class="ic">✎</span> 수정</div>
  <div class="mi"><span class="ic">⎘</span> 복제</div>
  <div class="mi"><span class="ic">↗</span> 공장에 배포</div>
  <div class="sep"></div>
  <div class="mi danger"><span class="ic">🗑</span> 삭제</div>
</div>
</body></html>
