<!-- @dsCard group="Layouts" -->
<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chat 2-pane</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;--border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--danger:#E5484D;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0}
.shell{display:flex;height:600px;border:1px solid var(--border);background:var(--surface)}
/* list */
.list{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.lhd{padding:16px 18px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700}
.rooms{overflow:auto}
.room{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.room.on{background:var(--accent-tint)}
.room:hover:not(.on){background:var(--surface-muted)}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;background-image:linear-gradient(135deg,#5FBE9B,#1A7F64)}
.av.b{background-image:linear-gradient(135deg,#7C8AE0,#5469D4)}
.rr{flex:1;min-width:0}
.rr .nm{font-size:14px;font-weight:600;display:flex;justify-content:space-between}
.rr .nm .tm{font-size:11px;color:var(--ink-subtle);font-weight:500}
.rr .ms{font-size:12px;color:var(--ink-subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.unread{background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:1px 6px;margin-left:6px}
/* thread */
.thread{flex:1;display:flex;flex-direction:column;min-width:0}
.thd{padding:14px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px}
.body{flex:1;background:var(--canvas);padding:18px;display:flex;flex-direction:column;gap:12px;overflow:auto}
.msg{max-width:70%;padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.45}
.in{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
.out{align-self:flex-end;background:var(--accent);color:#fff;border-top-right-radius:4px}
.input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.ti{flex:1;height:40px;border:1px solid var(--border);border-radius:10px;padding:0 13px;font-family:inherit;font-size:14px}
.send{height:40px;padding:0 16px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-weight:600;font-family:inherit}
</style></head><body>
<div class="shell">
  <aside class="list">
    <div class="lhd">채팅</div>
    <div class="rooms">
      <div class="room on"><div class="av"></div><div class="rr"><div class="nm"><span>천일쇼파</span><span class="tm">11:02</span></div><div class="ms">견적서에 반영해서 보내드리겠습니다.</div></div></div>
      <div class="room"><div class="av b"></div><div class="rr"><div class="nm"><span>소핏 매니저<span class="unread">2</span></span><span class="tm">어제</span></div><div class="ms">매칭이 완료되었습니다. 확인 부탁드려요.</div></div></div>
      <div class="room"><div class="av"></div><div class="rr"><div class="nm"><span>우리가구</span><span class="tm">06.22</span></div><div class="ms">사진 잘 봤습니다 :)</div></div></div>
    </div>
  </aside>
  <section class="thread">
    <div class="thd">천일쇼파</div>
    <div class="body">
      <div class="msg in">안녕하세요! 도면 잘 받았습니다.</div>
      <div class="msg out">원목 느낌으로 따뜻하게 갔으면 좋겠어요.</div>
      <div class="msg in">좋네요. 견적서에 반영해서 보내드리겠습니다.</div>
    </div>
    <div class="input"><input class="ti" placeholder="메시지를 입력하세요…"><button class="send">전송</button></div>
  </section>
</div>
</body></html>
