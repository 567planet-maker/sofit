<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>List Page</title>
<style>
:root{
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F7F9FC;
  --border:#E3E8EE;--border-strong:#D5DBE3;--accent:#5469D4;--accent-tint:#EDEFFB;
  --success:#1A7F64;--success-tint:#E6F4EF;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:28px;-webkit-font-smoothing:antialiased}
.wrap{max-width:880px;margin:0 auto}
.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.head h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0}
.head p{font-size:13px;color:var(--ink-muted);margin:6px 0 0}
.btn{height:38px;padding:0 16px;border-radius:6px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer}
.tabs{display:inline-flex;gap:2px;background:var(--surface-muted);border:1px solid var(--border);padding:4px;border-radius:8px;margin-bottom:18px}
.tabs a{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;color:var(--ink-subtle);text-decoration:none}
.tabs a.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 2px rgba(26,31,54,.06)}
.tablecard{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 1px 1px rgba(0,0,0,.03),0 2px 5px rgba(26,31,54,.06);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{text-align:left;font-size:12px;font-weight:600;color:var(--ink-subtle);background:var(--surface-muted);padding:11px 18px;border-bottom:1px solid var(--border)}
tbody td{padding:14px 18px;border-bottom:1px solid var(--border);color:var(--ink-muted)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-muted)}
td.nm{font-weight:600;color:var(--ink)}
.b{display:inline-flex;font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px}
</style></head>
<body>
<div class="wrap">
  <div class="head">
    <div><h1>견적 요청</h1><p>접수된 요청을 검수하고 공장에 매칭합니다.</p></div>
    <button class="btn">+ 새 요청</button>
  </div>
  <div class="tabs"><a class="on">전체</a><a>접수·검토</a><a>매칭·견적</a><a>계약·시공</a><a>완료</a></div>
  <div class="tablecard">
    <table>
      <thead><tr><th>접수일</th><th>업체명</th><th>현장명</th><th>상태</th></tr></thead>
      <tbody>
        <tr><td>06.26</td><td class="nm">천일쇼파</td><td>강남 플래그십 매장</td><td><span class="b" style="background:#EEF2FB;color:#3D55B5">접수됨</span></td></tr>
        <tr><td>06.24</td><td class="nm">우리가구</td><td>분당 카페 리뉴얼</td><td><span class="b" style="background:var(--accent-tint);color:var(--accent)">매칭중</span></td></tr>
        <tr><td>06.21</td><td class="nm">한성목공</td><td>일산 병원 대기실</td><td><span class="b" style="background:var(--success-tint);color:var(--success)">계약완료</span></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
