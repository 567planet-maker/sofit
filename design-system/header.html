<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Header</title>
<style>
:root{
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--border:#E3E8EE;
  --accent:#5469D4;--accent-tint:#EDEFFB;--danger:#E5484D;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:32px;-webkit-font-smoothing:antialiased}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 12px}
.hd{background:var(--surface);border:1px solid var(--border);border-radius:12px;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;margin-bottom:26px}
.logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-.01em}
.nav{display:flex;align-items:center;gap:24px}
.nav a{font-size:14px;font-weight:600;color:var(--ink-muted);text-decoration:none}
.nav a.on{color:var(--ink)}
.right{display:flex;align-items:center;gap:14px}
.bell{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-muted);position:relative}
.bell::after{content:"";position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}
.prof{display:flex;align-items:center;gap:9px;padding:4px 10px 4px 4px;border:1px solid var(--border);border-radius:999px}
.av{width:30px;height:30px;border-radius:50%;background-image:linear-gradient(135deg,#7C8AE0,#5469D4)}
.prof .nm{font-size:13px;font-weight:600}
</style></head>
<body>
<h2>고객 · 공장 헤더 (상단 네비 + 알림 + 프로필 사진)</h2>
<div class="hd">
  <div class="logo">소핏</div>
  <nav class="nav"><a class="on">내 견적</a><a>채팅</a><a>포트폴리오</a></nav>
  <div class="right">
    <div class="bell">🔔</div>
    <div class="prof"><div class="av"></div><span class="nm">김동건</span></div>
  </div>
</div>
</body></html>
