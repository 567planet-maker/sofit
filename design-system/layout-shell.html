<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>App Shell</title>
<style>
:root{
  --ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;
  --canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;
  --border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--danger:#E5484D;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:680px}
/* sidebar */
.side{width:236px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.brand{height:60px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:16px}
.brand .dot{color:var(--accent)}
.nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px}
.nav .grp{font-size:11px;font-weight:600;color:var(--ink-subtle);text-transform:uppercase;letter-spacing:.05em;padding:14px 10px 6px}
.nav a{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:7px;font-size:14px;font-weight:500;color:var(--ink-muted);text-decoration:none}
.nav a:hover{background:var(--surface-muted);color:var(--ink)}
.nav a.on{background:var(--accent-tint);color:var(--accent);font-weight:600}
.nav .ct{font-size:11px;font-weight:700;background:var(--danger);color:#fff;border-radius:999px;padding:1px 7px}
.who{padding:14px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-subtle)}
/* main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.top{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.top .title{font-size:18px;font-weight:700;letter-spacing:-.01em}
.top .right{display:flex;align-items:center;gap:14px}
.bell{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--ink-muted);position:relative}
.bell::after{content:"";position:absolute;top:7px;right:8px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}
.av{width:34px;height:34px;border-radius:50%;background:var(--accent-tint);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.content{flex:1;padding:28px;overflow:auto}
.ph{border:1.5px dashed var(--border);border-radius:10px;height:100%;min-height:380px;display:flex;align-items:center;justify-content:center;color:var(--ink-subtle);font-size:13px;background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(132,146,162,.04) 12px,rgba(132,146,162,.04) 24px)}
</style></head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">소핏 <span class="dot">·</span> 관리자</div>
    <nav class="nav">
      <a class="on" href="#">대시보드</a>
      <div class="grp">운영</div>
      <a href="#">견적 요청 <span class="ct">3</span></a>
      <a href="#">공장 관리 <span class="ct">2</span></a>
      <a href="#">채팅</a>
      <a href="#">사용자</a>
    </nav>
    <div class="who">김동건 · admin</div>
  </aside>
  <div class="main">
    <header class="top">
      <div class="title">대시보드</div>
      <div class="right"><div class="bell">🔔</div><div class="av">김</div></div>
    </header>
    <div class="content"><div class="ph">페이지 콘텐츠 (목록 / 상세 / 대시보드 템플릿이 여기에 들어감)</div></div>
  </div>
</div>
</body></html>
