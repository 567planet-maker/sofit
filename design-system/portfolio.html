<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio gallery</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;--border:#E3E8EE;--accent:#5469D4;--accent-tint:#EDEFFB;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:32px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:720px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 1px rgba(0,0,0,.03),0 2px 5px rgba(26,31,54,.06);transition:box-shadow .12s}
.card:hover{box-shadow:0 6px 18px rgba(26,31,54,.10)}
.img{aspect-ratio:4/3;background-size:cover;background-position:center}
.i1{background-image:linear-gradient(135deg,#CDB79E,#A38B6A)}
.i2{background-image:linear-gradient(135deg,#B9C3D4,#7E8BA3)}
.i3{background-image:linear-gradient(135deg,#CBD8CF,#8FA89A)}
.meta{padding:12px 14px}
.cat{display:inline-block;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-tint);padding:2px 8px;border-radius:999px}
.t{font-size:14px;font-weight:600;margin-top:8px}
.f{font-size:12px;color:var(--ink-subtle);margin-top:3px}
</style></head><body>
<h2>포트폴리오 갤러리 (공장 작업 사례)</h2>
<div class="grid">
  <div class="card"><div class="img i1"></div><div class="meta"><span class="cat">카페</span><div class="t">성수동 로스터리</div><div class="f">천일쇼파</div></div></div>
  <div class="card"><div class="img i2"></div><div class="meta"><span class="cat">병원</span><div class="t">분당 정형외과 대기실</div><div class="f">우리가구</div></div></div>
  <div class="card"><div class="img i3"></div><div class="meta"><span class="cat">음식점</span><div class="t">한남동 다이닝바</div><div class="f">한성목공</div></div></div>
</div>
</body></html>
