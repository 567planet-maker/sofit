<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tabs</title>
<style>
:root{--ink:#1A1F36;--ink-muted:#4F566B;--ink-subtle:#8792A2;--canvas:#F6F8FB;--surface:#FFFFFF;--surface-muted:#F0F3F8;--border:#E3E8EE;--accent:#5469D4;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
*{box-sizing:border-box}body{font-family:var(--font);color:var(--ink);background:var(--canvas);margin:0;padding:40px}
h2{font-size:12px;color:var(--ink-subtle);font-weight:600;margin:24px 0 12px}
h2:first-child{margin-top:0}
/* pill */
.pill{display:inline-flex;gap:2px;background:var(--surface-muted);border:1px solid var(--border);padding:4px;border-radius:9px}
.pill a{padding:7px 15px;border-radius:6px;font-size:13px;font-weight:600;color:var(--ink-subtle);text-decoration:none}
.pill a.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 2px rgba(26,31,54,.06)}
/* underline */
.under{display:inline-flex;gap:6px;border-bottom:1px solid var(--border)}
.under a{padding:10px 14px;font-size:14px;font-weight:600;color:var(--ink-subtle);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.under a.on{color:var(--accent);border-bottom-color:var(--accent)}
.cnt{font-size:11px;margin-left:5px;color:var(--ink-subtle)}
.on .cnt{color:var(--accent)}
</style></head><body>
<h2>Pill tabs (목록 필터)</h2>
<div class="pill"><a class="on">전체 <span class="cnt">24</span></a><a>접수·검토</a><a>매칭·견적</a><a>계약·시공</a><a>완료</a></div>
<h2>Underline tabs (상세 섹션)</h2>
<div class="under"><a class="on">신규 요청</a><a>내 참여 <span class="cnt">3</span></a><a>거절됨</a></div>
</body></html>
